<svg color="#C9CDD1" xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820">
<style>
  @keyframes h06rest { 0%, 20% { opacity: 1; } 24%, 76% { opacity: 0; } 80%, 100% { opacity: 1; } }
  @keyframes h06greet { 0%, 20% { opacity: 0; } 24%, 76% { opacity: 1; } 80%, 100% { opacity: 0; } }
  @keyframes h06wobble {
    0%, 26% { transform: rotate(0deg); }
    34% { transform: rotate(7deg); }
    42% { transform: rotate(-6deg); }
    50% { transform: rotate(7deg); }
    58% { transform: rotate(-6deg); }
    66% { transform: rotate(5deg); }
    74%, 100% { transform: rotate(0deg); }
  }
  #arm-right { animation: h06rest 7s ease-in-out infinite; }
  #mouth-smile { animation: h06rest 7s ease-in-out infinite; }
  #arm-wave { opacity: 0; transform-box: view-box; transform-origin: 822px 332px;
    animation: h06greet 7s ease-in-out infinite, h06wobble 7s ease-in-out infinite; }
  #mouth-grin { opacity: 0; animation: h06greet 7s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) {
    #arm-right, #arm-wave, #mouth-smile, #mouth-grin { animation: none; }
  }
</style>

